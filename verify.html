<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verifikasi Bukti Pembayaran — Darul Falah Gambut</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  background: #f3f4f6; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px 40px;
}

.header {
  width: 100%; max-width: 420px;
  background: linear-gradient(135deg, #1a56db, #1344b3);
  border-radius: 20px; padding: 24px 20px;
  text-align: center; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(26,86,219,0.3);
}
.logo-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 12px;
}
.logo-box {
  width: 48px; height: 48px; background: white;
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
}
.header h1 { font-size: 15px; font-weight: 800; color: white; line-height: 1.3; text-align: left; }
.header p { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 8px; }

.card {
  width: 100%; max-width: 420px;
  background: white; border-radius: 20px;
  overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  margin-bottom: 16px;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid #f3f4f6;
  display: flex; align-items: center; gap: 12px;
}
.status-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.status-icon svg { width: 26px; height: 26px; }
.status-valid { background: #dcfce7; }
.status-invalid { background: #fee2e2; }
.status-info h2 { font-size: 16px; font-weight: 800; }
.status-info p { font-size: 12px; margin-top: 3px; }
.text-green { color: #059669; }
.text-red { color: #dc2626; }
.text-gray { color: #6b7280; }

.card-body { padding: 16px 20px; }
.info-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 10px 0; border-bottom: 1px solid #f9fafb;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: #9ca3af; font-weight: 600; }
.info-value { font-size: 13px; font-weight: 700; color: #111827; text-align: right; max-width: 60%; }

.bulan-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 4px; margin-top: 8px;
}
.bulan-cell {
  text-align: center; padding: 5px 2px;
  border-radius: 6px; font-size: 10px; font-weight: 700;
}
.lunas { background: #dcfce7; color: #166534; }
.belum { background: #fee2e2; color: #991b1b; }

.total-box {
  background: linear-gradient(135deg, #1a56db, #1344b3);
  border-radius: 12px; padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin: 12px 0;
}
.total-label { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 700; }
.total-amount { font-size: 20px; font-weight: 800; color: white; }
.total-detail { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }

.ref-badge {
  display: inline-block; background: #f3f4f6; color: #6b7280;
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  padding: 4px 14px; border-radius: 20px; margin-bottom: 12px;
}

.disclaimer {
  width: 100%; max-width: 420px;
  background: #fffbeb; border: 1.5px solid #fbbf24;
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; color: #92400e; line-height: 1.5;
  margin-bottom: 16px;
}
.disclaimer strong { font-weight: 700; }

.invalid-card {
  width: 100%; max-width: 420px;
  background: white; border-radius: 20px; padding: 32px 20px;
  text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
}
.invalid-card .icon { font-size: 48px; margin-bottom: 12px; }
.invalid-card h2 { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
.invalid-card p { font-size: 13px; color: #6b7280; line-height: 1.5; }

.footer-note {
  font-size: 11px; color: #9ca3af; text-align: center;
  max-width: 420px; line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-box">
      <svg viewBox="0 0 56 56" width="34" height="34">
        <path d="M28 6L8 44h40L28 6z" fill="#1a56db"/>
        <path d="M28 6L40 44H28V6z" fill="#f59e0b"/>
        <ellipse cx="28" cy="41" rx="8" ry="5" fill="#10b981"/>
      </svg>
    </div>
    <h1>PONDOK PESANTREN<br>DARUL FALAH GAMBUT</h1>
  </div>
  <p>🔍 Halaman Verifikasi Bukti Pembayaran</p>
</div>

<div id="output"></div>

<div class="footer-note">
  Halaman ini digunakan untuk memverifikasi keaslian bukti pembayaran.<br>
  Data ditampilkan langsung dari parameter yang di-generate oleh sistem resmi pesantren.
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const MONTHS_FULL = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function formatRp(num) {
  if (!num) return '0';
  return parseInt(num).toLocaleString('id-ID');
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const out = document.getElementById('output');

  // Param pendek: r=ref, j=jenis, b=bulan, t=tarif, s=total, n=nama, d=tgl
  const ref   = params.get('r') || params.get('ref');
  const jenis = params.get('j') || params.get('jenis');
  const bulan = params.get('b') || params.get('bulan');
  const tarif = parseInt(params.get('t') || params.get('tarif')) || 0;
  const total = parseInt(params.get('s') || params.get('total')) || 0;
  const nama  = params.get('n') || params.get('nama') || '';
  const tgl   = params.get('d') || params.get('tgl');

  // Param lama (fallback kompatibilitas)
  const bin   = params.get('bin')  || '';
  const info  = params.get('info') || '-';
  const ta    = params.get('ta')   || '';
  const oleh  = params.get('oleh') || 'Admin';

  if (!ref || !nama || !bulan) {
    out.innerHTML = `
      <div class="invalid-card">
        <div class="icon">❓</div>
        <h2>Parameter Tidak Valid</h2>
        <p>Link verifikasi ini tidak lengkap atau sudah tidak berlaku.<br>
        Pastikan Anda membuka link yang dikirim langsung dari sistem pesantren.</p>
      </div>`;
    return;
  }

  // Parse bulan string "100101..." (12 karakter 0/1)
  const months = bulan.split('').map(c => c === '1');
  const lunasCount = months.filter(Boolean).length;
  const belumCount = 12 - lunasCount;
  const isValid = ref && nama && bulan.length === 12;
  const binLabel = jenis === 'spp' ? 'bin' : 'binti';
  const infoLabel = jenis === 'spp' ? 'Kelas' : 'Kamar';
  const tglFormatted = tgl ? new Date(tgl).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) : '-';

  const bulanGridHTML = months.map((m, i) =>
    `<div class="bulan-cell ${m ? 'lunas' : 'belum'}">${MONTHS[i]}</div>`
  ).join('');

  out.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="status-icon ${isValid ? 'status-valid' : 'status-invalid'}">
          ${isValid
            ? `<svg fill="none" viewBox="0 0 24 24" stroke="#059669"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
            : `<svg fill="none" viewBox="0 0 24 24" stroke="#dc2626"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
          }
        </div>
        <div class="status-info">
          <h2 class="${isValid ? 'text-green' : 'text-red'}">
            ${isValid ? '✓ Bukti Terverifikasi' : '✗ Bukti Tidak Valid'}
          </h2>
          <p class="text-gray">Bukti Pembayaran ${jenis === 'spp' ? 'SPP' : 'Catering'}</p>
        </div>
      </div>

      <div class="card-body">
        <div style="text-align:center;margin-bottom:14px;">
          <span class="ref-badge">${ref}</span>
        </div>

        <div class="info-row">
          <span class="info-label">Nama Santri</span>
          <span class="info-value">${nama}<br><span style="font-weight:500;color:#6b7280;font-size:11px;">${binLabel} ${bin}</span></span>
        </div>
        ${jenis === 'spp'
          ? `<div class="info-row">
              <span class="info-label">Kelas</span>
              <span class="info-value">${info}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Tahun Ajaran</span>
              <span class="info-value">${ta}</span>
            </div>`
          : `<div class="info-row">
              <span class="info-label">Kamar</span>
              <span class="info-value">${info}</span>
            </div>`
        }
        <div class="info-row">
          <span class="info-label">Tarif / Bulan</span>
          <span class="info-value">Rp ${formatRp(tarif)}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Bulan Lunas</span>
          <span class="info-value text-green">${lunasCount} bulan</span>
        </div>
        <div class="info-row">
          <span class="info-label">Belum Bayar</span>
          <span class="info-value ${belumCount > 0 ? 'text-red' : 'text-green'}">${belumCount} bulan</span>
        </div>

        <!-- Grid bulan -->
        <div style="margin:12px 0 4px;">
          <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Detail Per Bulan</div>
          <div class="bulan-grid">${bulanGridHTML}</div>
        </div>

        <!-- Total -->
        <div class="total-box">
          <div>
            <div class="total-label">TOTAL TERBAYAR</div>
            <div class="total-amount">Rp ${formatRp(total)}</div>
          </div>
          <div style="text-align:right;">
            <div class="total-detail">${lunasCount} × Rp ${formatRp(tarif)}</div>
          </div>
        </div>

        <div class="info-row">
          <span class="info-label">Dicatat oleh</span>
          <span class="info-value">${oleh || '-'}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Tanggal</span>
          <span class="info-value">${tglFormatted}</span>
        </div>
      </div>
    </div>

    <div class="disclaimer">
      <strong>⚠️ Catatan Penting:</strong> Halaman ini menampilkan data yang di-encode saat bukti dicetak/dikirim.
      Untuk verifikasi mutlak, konfirmasi langsung ke administrasi PP. Darul Falah Gambut
      dengan menyebutkan No. Referensi <strong>${ref}</strong>.
    </div>`;
}

render();
</script>
</body>
</html>
